<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股掃描系統 v4.9</title>
<style>
  :root {
    --bg: #f5f5f3;
    --surface: #ffffff;
    --surface2: #f0efeb;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.2);
    --text: #1a1a18;
    --text2: #5f5e5a;
    --text3: #888780;
    --green: #1D9E75; --green-bg: #E1F5EE; --green-text: #0F6E56;
    --blue: #378ADD;  --blue-bg: #E6F1FB;  --blue-text: #185FA5;
    --amber: #BA7517; --amber-bg: #FAEEDA; --amber-text: #854F0B;
    --red: #E24B4A;   --red-bg: #FCEBEB;   --red-text: #A32D2D;
    --gray-bg: #F1EFE8; --gray-text: #5F5E5A;
    --coral: #D85A30; --coral-bg: #FAECE7; --coral-text: #993C1D;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18; --surface: #242422; --surface2: #2e2e2c;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --text: #e8e7e3; --text2: #a8a79f; --text3: #6e6d68;
      --green-bg: #085041; --green-text: #5DCAA5;
      --blue-bg: #0C447C;  --blue-text: #85B7EB;
      --amber-bg: #633806; --amber-text: #FAC775;
      --red-bg: #791F1F;   --red-text: #F09595;
      --gray-bg: #2C2C2A;  --gray-text: #B4B2A9;
      --coral-bg: #712B13; --coral-text: #F0997B;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC', sans-serif;
         background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; }
  a { color: var(--blue); }

  /* Layout */
  .layout { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
  .sidebar { background: var(--surface); border-right: 0.5px solid var(--border);
             padding: 1.5rem 1rem; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  .main { padding: 1.5rem; overflow: hidden; }

  /* Sidebar */
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; padding-bottom: 1rem;
          border-bottom: 0.5px solid var(--border); }
  .logo-icon { width: 36px; height: 36px; border-radius: 8px; background: var(--blue-bg);
               display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .logo-text { font-weight: 600; font-size: 14px; }
  .logo-sub  { font-size: 11px; color: var(--text3); }

  .param-section { margin-bottom: 1.25rem; }
  .param-section-title { font-size: 11px; font-weight: 600; color: var(--text3);
                         text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .param-row { margin-bottom: 8px; }
  .param-label { font-size: 12px; color: var(--text2); margin-bottom: 3px; }
  .param-row input, .param-row select {
    width: 100%; padding: 6px 10px; border-radius: 6px; font-size: 13px;
    border: 0.5px solid var(--border2); background: var(--surface2); color: var(--text);
    outline: none; transition: border-color 0.15s;
  }
  .param-row input:focus, .param-row select:focus { border-color: var(--blue); }

  .btn-scan { width: 100%; padding: 10px; border-radius: 8px; font-size: 14px; font-weight: 500;
              background: var(--blue); color: #fff; border: none; cursor: pointer;
              display: flex; align-items: center; justify-content: center; gap: 8px;
              transition: opacity 0.15s; margin-top: 1rem; }
  .btn-scan:disabled { opacity: 0.55; cursor: not-allowed; }
  .btn-scan:hover:not(:disabled) { opacity: 0.9; }

  .log-panel { margin-top: 1rem; }
  .log-title { font-size: 11px; font-weight: 600; color: var(--text3);
               text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .log-box { background: var(--surface2); border-radius: 6px; padding: 8px 10px;
             font-family: 'Courier New', monospace; font-size: 11px; color: var(--text2);
             max-height: 180px; overflow-y: auto; line-height: 1.7; }
  .progress-bar { height: 3px; background: var(--surface2); border-radius: 3px; margin-top: 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--blue); border-radius: 3px;
                   transition: width 0.4s; width: 0%; }

  /* Main area */
  .page-header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .page-title { font-size: 20px; font-weight: 600; }
  .regime-pill { padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: 500;
                 background: var(--surface2); color: var(--text2); border: 0.5px solid var(--border); }
  .regime-pill.bull { background: var(--green-bg); color: var(--green-text); border-color: transparent; }
  .regime-pill.bear { background: var(--red-bg);   color: var(--red-text);   border-color: transparent; }
  .last-scan { font-size: 12px; color: var(--text3); margin-left: auto; }

  /* Summary cards */
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
                  gap: 10px; margin-bottom: 1.5rem; }
  .sum-card { background: var(--surface); border-radius: 10px; border: 0.5px solid var(--border);
              padding: 12px 16px; }
  .sum-num   { font-size: 24px; font-weight: 600; }
  .sum-label { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .tab  { padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer;
          border: 0.5px solid var(--border); color: var(--text2); background: var(--surface);
          transition: all 0.15s; white-space: nowrap; }
  .tab.active { background: var(--blue-bg); color: var(--blue-text); border-color: transparent; }
  .tab:hover:not(.active) { border-color: var(--border2); }
  .tab-count { display: inline-block; background: var(--surface2); color: var(--text3);
               border-radius: 99px; padding: 0 6px; font-size: 10px; margin-left: 4px; }
  .tab.active .tab-count { background: rgba(0,0,0,0.12); color: inherit; }

  /* Stock cards */
  .stocks-list { display: flex; flex-direction: column; gap: 8px; }
  .stock-card { background: var(--surface); border: 0.5px solid var(--border);
                border-radius: 10px; padding: 12px 14px; border-left: 3px solid transparent; }
  .stock-card.A    { border-left-color: var(--green); }
  .stock-card.B    { border-left-color: var(--blue); }
  .stock-card.C    { border-left-color: var(--amber); }
  .stock-card.D    { border-left-color: var(--gray-text); }
  .stock-card.exit { border-left-color: var(--red); }
  .stock-card.watch{ border-left-color: transparent; }
  .stock-card.ETF-S{ border-left-color: var(--green); }
  .stock-card.ETF-B{ border-left-color: var(--blue); }
  .stock-card.fin  { border-left-color: var(--coral); }
  .stock-card.mom  { border-left-color: var(--amber); }

  .stock-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .stock-code { font-size: 15px; font-weight: 600; }
  .stock-name { font-size: 13px; color: var(--text2); }
  .stock-ind  { font-size: 11px; color: var(--text3); padding: 1px 7px; border-radius: 99px;
                background: var(--surface2); border: 0.5px solid var(--border); }
  .stock-ind.prio { background: var(--amber-bg); color: var(--amber-text); border-color: transparent; }

  .grade-badge { margin-left: auto; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; }
  .badge-A    { background: var(--green-bg); color: var(--green-text); }
  .badge-B    { background: var(--blue-bg);  color: var(--blue-text); }
  .badge-C    { background: var(--amber-bg); color: var(--amber-text); }
  .badge-D    { background: var(--gray-bg);  color: var(--gray-text); }
  .badge-exit { background: var(--red-bg);   color: var(--red-text); }
  .badge-watch{ background: var(--surface2); color: var(--text3); }
  .badge-ETF-S{ background: var(--green-bg); color: var(--green-text); }
  .badge-ETF-B{ background: var(--blue-bg);  color: var(--blue-text); }
  .badge-fin  { background: var(--coral-bg); color: var(--coral-text); }
  .badge-mom  { background: var(--amber-bg); color: var(--amber-text); }

  .metrics { display: flex; flex-wrap: wrap; gap: 5px; }
  .pill { font-size: 11px; padding: 2px 8px; border-radius: 99px;
          background: var(--surface2); color: var(--text2);
          border: 0.5px solid var(--border); white-space: nowrap; }
  .pill.ok  { background: var(--green-bg); color: var(--green-text); border-color: transparent; }
  .pill.warn{ background: var(--amber-bg); color: var(--amber-text); border-color: transparent; }
  .pill.bad { background: var(--red-bg);   color: var(--red-text);   border-color: transparent; }
  .pill.info{ background: var(--blue-bg);  color: var(--blue-text);  border-color: transparent; }

  .stock-note { font-size: 11px; color: var(--text3); margin-top: 6px; }

  /* Empty / error states */
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text3); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty h3 { font-size: 16px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
  .error-box { background: var(--red-bg); color: var(--red-text); border-radius: 8px;
               padding: 12px 16px; font-size: 13px; margin-bottom: 1rem; }

  /* Section header */
  .section-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .section-label { font-size: 13px; font-weight: 600; }
  .section-desc  { font-size: 11px; color: var(--text3); }
  .section-count { margin-left: auto; font-size: 12px; color: var(--text3); }

  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; border-right: none;
               border-bottom: 0.5px solid var(--border); }
    .main { padding: 1rem; }
  }
</style>
</head>
<body>
<div class="layout">

<!-- ── Sidebar ── -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-icon">📊</div>
    <div>
      <div class="logo-text">台股掃描系統</div>
      <div class="logo-sub">v4.9 撿股讚整合版</div>
    </div>
  </div>

  <div class="param-section">
    <div class="param-section-title">技術參數</div>
    <div class="param-row">
      <div class="param-label">K值門檻（≤ 此值才進場）</div>
      <input type="number" id="kThreshold" value="30" min="10" max="50">
    </div>
    <div class="param-row">
      <div class="param-label">YOY 年增率下限 (%)</div>
      <input type="number" id="yoyMin" value="15" min="0" max="100">
    </div>
  </div>

  <div class="param-section">
    <div class="param-section-title">財務品質</div>
    <div class="param-row">
      <div class="param-label">毛利率門檻 (%)</div>
      <input type="number" id="grossMargin" value="25" min="0" max="80">
    </div>
    <div class="param-row">
      <div class="param-label">營業利益率門檻 (%)</div>
      <input type="number" id="opMargin" value="15" min="0" max="60">
    </div>
    <div class="param-row">
      <div class="param-label">利息保障倍數下限</div>
      <input type="number" id="interestCover" value="15" min="1" max="100">
    </div>
    <div class="param-row">
      <div class="param-label">財務篩選模式</div>
      <select id="finBlock">
        <option value="true">擋掉不達標</option>
        <option value="false">僅標記</option>
      </select>
    </div>
  </div>

  <button class="btn-scan" id="scanBtn" onclick="startScan()">
    <span id="scanIcon">▶</span> 開始掃描
  </button>

  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <div class="log-panel">
    <div class="log-title">掃描日誌</div>
    <div class="log-box" id="logBox"><span style="color:var(--text3)">等待掃描...</span></div>
  </div>
</aside>

<!-- ── Main ── -->
<main class="main">
  <div class="page-header">
    <div class="page-title">掃描結果</div>
    <span class="regime-pill" id="regimePill">尚未掃描</span>
    <span class="last-scan" id="lastScan"></span>
  </div>

  <div id="errorBox" style="display:none"></div>

  <div id="summaryGrid" style="display:none" class="summary-grid">
    <div class="sum-card">
      <div class="sum-num" id="sA" style="color:var(--green)">─</div>
      <div class="sum-label">⭐⭐⭐ A類進場</div>
    </div>
    <div class="sum-card">
      <div class="sum-num" id="sBCD" style="color:var(--blue)">─</div>
      <div class="sum-label">⭐ B/C/D 類</div>
    </div>
    <div class="sum-card">
      <div class="sum-num" id="sEtf" style="color:var(--green)">─</div>
      <div class="sum-label">📡 ETF 訊號</div>
    </div>
    <div class="sum-card">
      <div class="sum-num" id="sExit" style="color:var(--red)">─</div>
      <div class="sum-label">🔴 出場訊號</div>
    </div>
    <div class="sum-card">
      <div class="sum-num" id="sTotal">─</div>
      <div class="sum-label">總掃描個股</div>
    </div>
    <div class="sum-card">
      <div class="sum-num" id="sYoy" style="color:var(--blue)">─</div>
      <div class="sum-label">YOY達標</div>
    </div>
    <div class="sum-card">
      <div class="sum-num" id="sFinPass" style="color:var(--green)">─</div>
      <div class="sum-label">財務達標</div>
    </div>
    <div class="sum-card">
      <div class="sum-num" id="sFinFail" style="color:var(--red)">─</div>
      <div class="sum-label">財務不達標</div>
    </div>
  </div>

  <div class="tabs" id="tabsRow" style="display:none"></div>
  <div id="stocksArea">
    <div class="empty">
      <div class="empty-icon">📈</div>
      <h3>準備掃描</h3>
      <p>設定參數後點擊「開始掃描」<br>系統將從撿股讚、yfinance 抓取即時資料</p>
    </div>
  </div>
</main>

</div>

<script>
const PRIO_IND = ['AI','伺服器','散熱','液冷','機殼','IC設計','半導體','晶圓','封裝','測試','設備','連接器','PCB','電路板','被動元件','網通','交換器','資安','感測器','影像','電動車','儲能','電池'];
let allResults = [], etfResults = [], currentTab = 'all';

async function startScan() {
  const btn = document.getElementById('scanBtn');
  if (btn.disabled) return;
  btn.disabled = true;
  document.getElementById('scanIcon').textContent = '⏳';
  document.getElementById('logBox').innerHTML = '';
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('progressFill').style.width = '5%';

  const params = {
    k_threshold:      parseInt(document.getElementById('kThreshold').value),
    yoy_min:          parseFloat(document.getElementById('yoyMin').value),
    gross_margin_min: parseFloat(document.getElementById('grossMargin').value),
    op_margin_min:    parseFloat(document.getElementById('opMargin').value),
    interest_cover:   parseFloat(document.getElementById('interestCover').value),
    fin_block:        document.getElementById('finBlock').value === 'true',
  };

  try {
    const r = await fetch('/api/scan', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(params)
    });
    if (!r.ok) { showError((await r.json()).error); resetBtn(); return; }
    pollStatus();
  } catch(e) { showError('無法連線到伺服器'); resetBtn(); }
}

async function pollStatus() {
  const interval = setInterval(async () => {
    try {
      const s = await (await fetch('/api/status')).json();
      const logs = s.log || [];
      const logBox = document.getElementById('logBox');
      logBox.innerHTML = logs.slice(-40).map(l => `<div>${escHtml(l)}</div>`).join('');
      logBox.scrollTop = logBox.scrollHeight;

      const pct = s.running ? Math.min(90, 5 + logs.length * 2) : 100;
      document.getElementById('progressFill').style.width = pct + '%';

      if (!s.running) {
        clearInterval(interval);
        if (s.error) { showError(s.error); resetBtn(); return; }
        await loadResults();
        resetBtn();
      }
    } catch(e) { /* retry */ }
  }, 1000);
}

async function loadResults() {
  const r = await fetch('/api/results');
  if (!r.ok) { showError('無法取得結果'); return; }
  const data = await r.json();

  allResults = data.results || [];
  etfResults = data.etf_results || [];
  const regime = data.regime || {};
  const stats  = data.stats || {};

  // Regime
  const pill = document.getElementById('regimePill');
  const sc = regime.score || 0;
  const nm = regime.name || '中性';
  if (regime.regime_type === 'bull' || sc >= 60) { pill.className = 'regime-pill bull'; pill.textContent = `多頭 ${nm} ${sc}分`; }
  else if (regime.regime_type === 'bear' || sc < 40) { pill.className = 'regime-pill bear'; pill.textContent = `空頭 ${nm} ${sc}分`; }
  else { pill.className = 'regime-pill'; pill.textContent = `中性 ${nm} ${sc}分`; }

  if (data.last_scan) {
    document.getElementById('lastScan').textContent = '上次掃描：' + data.last_scan.replace('T',' ').slice(0,19);
  }

  // Stats
  document.getElementById('summaryGrid').style.display = '';
  const grpA = allResults.filter(r => r.entry_type === 'A');
  const grpBCD = allResults.filter(r => ['B','C','D'].includes(r.entry_type));
  const grpExit = allResults.filter(r => r.exit_signal && !r.entry_type);
  const etfSig = etfResults.filter(r => r.etf_signal === 'strong_buy' || r.etf_signal === 'buy');
  document.getElementById('sA').textContent      = grpA.length;
  document.getElementById('sBCD').textContent    = grpBCD.length;
  document.getElementById('sEtf').textContent    = etfSig.length;
  document.getElementById('sExit').textContent   = grpExit.length;
  document.getElementById('sTotal').textContent  = allResults.length;
  document.getElementById('sYoy').textContent    = stats.yoy_pass || '─';
  document.getElementById('sFinPass').textContent= stats.fin_pass || '─';
  document.getElementById('sFinFail').textContent= stats.fin_fail || '─';

  renderTabs();
  renderTab(currentTab);
}

function renderTabs() {
  const grps = getGroups();
  const tabs = [
    { id: 'all',   label: '全部', count: allResults.length + etfResults.length },
    { id: 'A',     label: '⭐⭐⭐ A類', count: grps.A.length },
    { id: 'BCD',   label: '⭐ B/C/D', count: grps.B.length + grps.C.length + grps.D.length },
    { id: 'etf',   label: '📡 ETF', count: etfResults.filter(r => r.etf_signal !== 'watch').length },
    { id: 'exit',  label: '🔴 出場', count: grps.exit.length },
    { id: 'watch', label: '觀察中', count: grps.watch.length },
    { id: 'fin',   label: '財務擋', count: grps.fin.length },
  ].filter(t => t.count > 0 || t.id === 'all');

  document.getElementById('tabsRow').style.display = '';
  document.getElementById('tabsRow').innerHTML = tabs.map(t =>
    `<div class="tab ${currentTab === t.id ? 'active' : ''}" onclick="switchTab('${t.id}')">${t.label}<span class="tab-count">${t.count}</span></div>`
  ).join('');
}

function switchTab(id) {
  currentTab = id;
  renderTabs();
  renderTab(id);
}

function getGroups() {
  return {
    A:     allResults.filter(r => r.entry_type === 'A'),
    B:     allResults.filter(r => r.entry_type === 'B'),
    C:     allResults.filter(r => r.entry_type === 'C'),
    D:     allResults.filter(r => r.entry_type === 'D'),
    exit:  allResults.filter(r => r.exit_signal && !r.entry_type && !r.entry_blocked),
    fin:   allResults.filter(r => r.fin_blocked),
    mom:   allResults.filter(r => r.mom_blocked),
    watch: allResults.filter(r => !r.entry_type && !r.exit_signal && !r.entry_blocked && !r.error),
  };
}

function renderTab(id) {
  const g = getGroups();
  const area = document.getElementById('stocksArea');
  let sections = [];

  if (id === 'all' || id === 'A')   sections.push({ grp: g.A,    grade: 'A',    label: '⭐⭐⭐ A類進場', desc: '42↑ 20↑ 60↑ + >60MA + DIF + K≤門檻' });
  if (id === 'all' || id === 'BCD') sections.push({ grp: g.B,    grade: 'B',    label: '⭐⭐ B類進場', desc: '42↑ + 突破20MA' });
  if (id === 'all' || id === 'BCD') sections.push({ grp: g.C,    grade: 'C',    label: '⭐ C類進場',  desc: '>42MA <20MA + K≤門檻' });
  if (id === 'all' || id === 'BCD') sections.push({ grp: g.D,    grade: 'D',    label: '⭐ D類進場',  desc: '>42MA + DIF + K≤門檻' });
  if (id === 'all' || id === 'etf') {
    const etfS = etfResults.filter(r => r.etf_signal === 'strong_buy');
    const etfB = etfResults.filter(r => r.etf_signal === 'buy');
    if (etfS.length) sections.push({ grp: etfS, grade: 'ETF-S', label: '🟢 ETF強烈買進', desc: `日K≤${etfS[0]?.k_day||25}` });
    if (etfB.length) sections.push({ grp: etfB, grade: 'ETF-B', label: '🟡 ETF買進', desc: '60分K≤門檻' });
  }
  if (id === 'all' || id === 'exit') sections.push({ grp: g.exit, grade: 'exit', label: '🔴 出場訊號', desc: '符合出場條件' });
  if (id === 'all' || id === 'fin')  sections.push({ grp: g.fin,  grade: 'fin',  label: '🚫 財務擋掉', desc: '財務品質不達標' });
  if (id === 'all' || id === 'watch') sections.push({ grp: g.watch, grade: 'watch', label: '─ 觀察中', desc: '技術條件尚未滿足' });

  const html = sections.filter(s => s.grp.length > 0).map(sec => `
    <div style="margin-bottom:1.5rem">
      <div class="section-hdr">
        <span class="section-label">${escHtml(sec.label)}</span>
        <span class="section-desc">— ${escHtml(sec.desc)}</span>
        <span class="section-count">${sec.grp.length} 檔</span>
      </div>
      <div class="stocks-list">${sec.grp.map(r => renderCard(r, sec.grade)).join('')}</div>
    </div>
  `).join('');

  area.innerHTML = html || `<div class="empty"><div class="empty-icon">✅</div><h3>此分類無資料</h3></div>`;
}

const PRIO_SET = new Set(PRIO_IND);
function isPrio(ind) { return ind && PRIO_IND.some(p => ind.includes(p)); }

function fmt(v, d=1) { return v != null ? Number(v).toFixed(d) : 'N/A'; }
function fmtPct(v) { return v != null ? (v >= 0 ? '+' : '') + fmt(v, 1) + '%' : 'N/A'; }
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderCard(r, grade) {
  const ind = r.industry || r.name || '';
  const prio = isPrio(ind);
  const prioStar = prio ? '🏆 ' : '';
  const fq = r.fin_quality || {};
  const gm = fq.gross_margin_q1; const om = fq.op_margin_q1;
  const ic = fq.interest_coverage;
  const finPass = fq.fin_pass;
  const finIcon = finPass === true ? '✅' : finPass === false ? '❌' : '─';
  const finCls  = finPass === true ? 'ok' : finPass === false ? 'bad' : '';

  const k = r.k60; const kNum = Number(k);
  const kThr = parseInt(document.getElementById('kThreshold').value);
  const kCls = kNum <= kThr ? 'ok' : kNum <= kThr + 15 ? 'warn' : '';

  const momGrade = r.mom_grade || 'NA';
  const momCls = momGrade === 'A' ? 'ok' : momGrade === 'W' ? 'bad' : momGrade === 'C' ? 'warn' : '';
  const momIcon = {A:'✅', B:'~', C:'⚠', W:'🔴', NA:'?'}[momGrade] || '?';

  const vol = r.vol_surge || {};
  const volIcon = vol.level === 'best' ? '🚀' : vol.level === 'watch' ? '⚡' : vol.level === 'consec' ? '📶' : '';

  const failReasons = (fq.fin_fail_reasons || r.entry_block_reason) ? 
    `<div class="stock-note">❌ ${escHtml((fq.fin_fail_reasons||[]).join('、') || r.entry_block_reason)}</div>` : '';

  const badgeLabel = grade === 'ETF-S' ? 'ETF🟢' : grade === 'ETF-B' ? 'ETF🟡' :
                     grade === 'exit' ? '出場' : grade === 'watch' ? '觀察' :
                     grade === 'fin' ? '財務擋' : grade === 'mom' ? 'MoM擋' : grade + '類';

  const yoyVal = r.yoy_m1 != null ? r.yoy_m1 : (r.fin_quality?.yoy_m1);

  return `<div class="stock-card ${escHtml(grade)}">
    <div class="stock-top">
      <span class="stock-code">${escHtml(r.tid)}</span>
      <span class="stock-name">${escHtml(r.name)}</span>
      <span class="stock-ind ${prio ? 'prio' : ''}">${prioStar}${escHtml(ind)}</span>
      <span class="grade-badge badge-${escHtml(grade)}">${badgeLabel}</span>
    </div>
    <div class="metrics">
      <span class="pill">${fmt(r.price, 2)} 元</span>
      <span class="pill ${kCls}">K=${k != null ? fmt(k,0) : 'N/A'}</span>
      <span class="pill">20MA ${fmt(r.ma20,1)}</span>
      <span class="pill">42MA ${fmt(r.ma42,1)}</span>
      <span class="pill">60MA ${fmt(r.ma60,1)}</span>
      <span class="pill ${r.ma42_rising ? 'ok' : 'warn'}">42MA${r.ma42_rising ? '↑' : '↓'}</span>
      <span class="pill ${r.dif_above_signal ? 'ok' : ''}">DIF${r.dif_above_signal ? '✅' : '─'}</span>
      ${yoyVal != null ? `<span class="pill ok">YOY ${fmtPct(yoyVal)}</span>` : ''}
      <span class="pill ${momCls}">MoM${momIcon}${r.mom_pct != null ? fmtPct(r.mom_pct) : 'N/A'}</span>
      <span class="pill ${finCls}">財務${finIcon} 毛${gm != null ? fmt(gm,0)+'%' : '─'} 營${om != null ? fmt(om,0)+'%' : '─'}</span>
      ${ic != null ? `<span class="pill ${ic > 15 ? 'ok' : 'warn'}">保障${fmt(ic,0)}x</span>` : ''}
      ${volIcon ? `<span class="pill ok">${volIcon} 量增</span>` : ''}
      ${r.channel?.alert ? `<span class="pill warn">通道${escHtml(r.channel.alert)}</span>` : ''}
    </div>
    ${failReasons}
  </div>`;
}

function showError(msg) {
  const b = document.getElementById('errorBox');
  b.style.display = '';
  b.innerHTML = `<div class="error-box">⚠️ ${escHtml(msg)}</div>`;
}

function resetBtn() {
  const btn = document.getElementById('scanBtn');
  btn.disabled = false;
  document.getElementById('scanIcon').textContent = '▶';
}

// Auto-load if results exist
(async () => {
  try {
    const s = await (await fetch('/api/status')).json();
    if (s.last_scan) await loadResults();
  } catch(e) {}
})();
</script>
</body>
</html>
