<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帳號管理後台 — 台股掃描系統</title>
<style>
  :root {
    --bg: #f5f5f3; --surface: #fff; --surface2: #f0efeb;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.2);
    --text: #1a1a18; --text2: #5f5e5a; --text3: #888780;
    --blue: #378ADD; --blue-bg: #E6F1FB; --blue-text: #185FA5;
    --green: #1D9E75; --green-bg: #E1F5EE; --green-text: #0F6E56;
    --red: #E24B4A; --red-bg: #FCEBEB; --red-text: #A32D2D;
    --amber-bg: #FAEEDA; --amber-text: #854F0B;
    --gray-bg: #F1EFE8; --gray-text: #5F5E5A;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18; --surface: #242422; --surface2: #2e2e2c;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --text: #e8e7e3; --text2: #a8a79f; --text3: #6e6d68;
      --blue-bg:#0C447C; --blue-text:#85B7EB;
      --green-bg:#085041; --green-text:#5DCAA5;
      --red-bg:#791F1F; --red-text:#F09595;
      --amber-bg:#633806; --amber-text:#FAC775;
      --gray-bg:#2C2C2A; --gray-text:#B4B2A9;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;
         background: var(--bg); color: var(--text); font-size: 14px; }

  .topbar { background: var(--surface); border-bottom: 0.5px solid var(--border);
            padding: 0 1.5rem; height: 52px;
            display: flex; align-items: center; gap: 12px; }
  .topbar-logo { font-size: 20px; }
  .topbar-title { font-weight: 600; font-size: 15px; }
  .topbar-sub { font-size: 12px; color: var(--text3); }
  .topbar-spacer { flex: 1; }
  .btn-sm { padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 500;
            cursor: pointer; border: 0.5px solid var(--border2);
            background: transparent; color: var(--text2); transition: all 0.15s; }
  .btn-sm:hover { background: var(--red-bg); color: var(--red-text); border-color:transparent; }
  .nav-link { font-size: 13px; color: var(--text3); text-decoration: none; }
  .nav-link:hover { color: var(--blue); }

  .main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

  /* Create form card */
  .card { background: var(--surface); border: 0.5px solid var(--border);
          border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
  .card-title { font-size: 15px; font-weight: 600; margin-bottom: 1.25rem;
                display: flex; align-items: center; gap: 8px; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr 100px; gap: 12px;
               align-items: end; }
  @media(max-width:600px){ .form-grid { grid-template-columns: 1fr; } }

  .field label { display: block; font-size: 12px; color: var(--text2);
                 margin-bottom: 5px; font-weight: 500; }
  .field input, .field select {
    width: 100%; padding: 8px 12px; border-radius: 8px;
    border: 0.5px solid var(--border2);
    background: var(--surface2); color: var(--text); font-size: 13px; outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus { border-color: var(--blue); }

  .btn-primary { width: 100%; padding: 9px 16px; border-radius: 8px; font-size: 13px;
                 font-weight: 500; background: var(--blue); color: #fff;
                 border: none; cursor: pointer; transition: opacity 0.15s; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary:hover:not(:disabled) { opacity: 0.88; }

  .msg-inline { font-size: 12px; margin-top: 8px; padding: 6px 10px;
                border-radius: 6px; display: none; }
  .msg-inline.ok  { background: var(--green-bg); color: var(--green-text); }
  .msg-inline.err { background: var(--red-bg);   color: var(--red-text); }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 12px; font-size: 11px; font-weight: 600;
       color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em;
       border-bottom: 0.5px solid var(--border); }
  td { padding: 10px 12px; border-bottom: 0.5px solid var(--border);
       vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }

  .pill { display: inline-block; padding: 2px 8px; border-radius: 99px;
          font-size: 11px; font-weight: 500; }
  .pill-active  { background: var(--green-bg); color: var(--green-text); }
  .pill-expired { background: var(--gray-bg);  color: var(--gray-text); }
  .pill-disabled{ background: var(--red-bg);   color: var(--red-text); }
  .pill-unused  { background: var(--amber-bg); color: var(--amber-text); }

  .pw-cell { font-family: monospace; font-size: 12px;
             background: var(--surface2); padding: 2px 7px; border-radius: 4px;
             border: 0.5px solid var(--border); letter-spacing: 0.05em; }

  .action-btn { padding: 3px 10px; border-radius: 5px; font-size: 11px;
                cursor: pointer; border: 0.5px solid var(--border2);
                background: transparent; color: var(--text2);
                transition: all 0.12s; margin-right: 4px; }
  .action-btn:hover { background: var(--red-bg); color: var(--red-text); border-color:transparent; }
  .action-btn.toggle:hover { background: var(--amber-bg); color: var(--amber-text); border-color:transparent; }

  .empty-row td { text-align: center; color: var(--text3); padding: 2rem; }

  .stat-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .stat-box { background: var(--surface); border: 0.5px solid var(--border);
              border-radius: 10px; padding: 12px 18px; flex: 1; min-width: 120px; }
  .stat-num   { font-size: 22px; font-weight: 600; }
  .stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; }

  .section-title { font-size: 15px; font-weight: 600; margin-bottom: 1rem;
                   display: flex; align-items: center; gap: 8px; }
  .count-badge { font-size: 11px; background: var(--surface2); color: var(--text3);
                 border-radius: 99px; padding: 1px 8px; font-weight: 400; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">⚙️</div>
  <div>
    <div class="topbar-title">帳號管理後台</div>
    <div class="topbar-sub">台股掃描系統 v4.9</div>
  </div>
  <div class="topbar-spacer"></div>
  <a href="/" class="nav-link">← 返回掃描頁</a>
  &nbsp;
  <button class="btn-sm" onclick="doLogout()">登出</button>
</div>

<div class="main">

  <!-- 統計 -->
  <div class="stat-row" id="statRow">
    <div class="stat-box"><div class="stat-num" id="statTotal">─</div><div class="stat-label">試用帳號總數</div></div>
    <div class="stat-box"><div class="stat-num" id="statActive" style="color:var(--green)">─</div><div class="stat-label">有效中</div></div>
    <div class="stat-box"><div class="stat-num" id="statUsed" style="color:var(--blue)">─</div><div class="stat-label">已使用</div></div>
    <div class="stat-box"><div class="stat-num" id="statExpired" style="color:var(--text3)">─</div><div class="stat-label">已過期</div></div>
  </div>

  <!-- 新增帳號 -->
  <div class="card">
    <div class="card-title">➕ 新增試用帳號</div>
    <div class="form-grid">
      <div class="field">
        <label>備註（例如：朋友A、客戶王先生）</label>
        <input type="text" id="newLabel" placeholder="備註名稱" maxlength="50">
      </div>
      <div class="field">
        <label>試用密碼（給對方輸入的）</label>
        <input type="text" id="newPw" placeholder="例如：wang2024" maxlength="50">
        <div style="margin-top:4px">
          <a href="#" onclick="genPw(); return false;"
             style="font-size:11px;color:var(--blue)">🎲 自動產生密碼</a>
        </div>
      </div>
      <div class="field">
        <label>有效天數</label>
        <select id="newDays">
          <option value="1">1 天</option>
          <option value="3">3 天</option>
          <option value="7">7 天</option>
          <option value="14">14 天</option>
          <option value="30">30 天</option>
        </select>
      </div>
    </div>
    <div style="margin-top:12px">
      <button class="btn-primary" id="createBtn" onclick="createAccount()"
              style="width:auto;padding:9px 24px">新增帳號</button>
    </div>
    <div class="msg-inline" id="createMsg"></div>
  </div>

  <!-- 帳號列表 -->
  <div class="section-title">
    試用帳號列表 <span class="count-badge" id="listCount">0</span>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>備註</th>
            <th>密碼</th>
            <th>有效期限</th>
            <th>首次使用</th>
            <th>狀態</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="trialTableBody">
          <tr class="empty-row"><td colspan="6">載入中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
function genPw() {
  const chars = 'abcdefghjkmnpqrstuvwxyz23456789';
  let pw = '';
  for (let i = 0; i < 8; i++) pw += chars[Math.floor(Math.random() * chars.length)];
  document.getElementById('newPw').value = pw;
}

async function loadList() {
  const r = await fetch('/api/admin/trials');
  if (!r.ok) return;
  const list = await r.json();

  document.getElementById('listCount').textContent = list.length;
  document.getElementById('statTotal').textContent = list.length;

  const active  = list.filter(a => a.is_active && !a.expired).length;
  const used    = list.filter(a => a.used_at).length;
  const expired = list.filter(a => a.expired).length;
  document.getElementById('statActive').textContent  = active;
  document.getElementById('statUsed').textContent    = used;
  document.getElementById('statExpired').textContent = expired;

  const tbody = document.getElementById('trialTableBody');
  if (!list.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">尚無試用帳號，請新增</td></tr>';
    return;
  }

  tbody.innerHTML = list.map(a => {
    let statusPill;
    if (!a.is_active)   statusPill = '<span class="pill pill-disabled">已停用</span>';
    else if (a.expired) statusPill = '<span class="pill pill-expired">已到期</span>';
    else if (!a.used_at)statusPill = '<span class="pill pill-unused">未使用</span>';
    else                statusPill = '<span class="pill pill-active">使用中</span>';

    const toggleLabel = a.is_active ? '停用' : '啟用';
    return `<tr>
      <td>${esc(a.label)}</td>
      <td><span class="pw-cell">${esc(a.password)}</span></td>
      <td>${esc(a.expires_at)}</td>
      <td>${a.used_at ? esc(a.used_at) : '<span style="color:var(--text3)">─</span>'}</td>
      <td>${statusPill}</td>
      <td>
        <button class="action-btn toggle" onclick="toggleAccount(${a.id})">${toggleLabel}</button>
        <button class="action-btn" onclick="deleteAccount(${a.id}, '${esc(a.label)}')">刪除</button>
      </td>
    </tr>`;
  }).join('');
}

async function createAccount() {
  const label = document.getElementById('newLabel').value.trim();
  const pw    = document.getElementById('newPw').value.trim();
  const days  = parseInt(document.getElementById('newDays').value);
  const btn   = document.getElementById('createBtn');
  const msg   = document.getElementById('createMsg');

  if (!label || !pw) { showMsg(msg, 'err', '請填寫備註與密碼'); return; }

  btn.disabled = true;
  btn.textContent = '新增中...';

  const r = await fetch('/api/admin/trials', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({label, password: pw, days}),
  });
  const data = await r.json();

  if (r.ok) {
    showMsg(msg, 'ok', `✅ 已新增「${label}」，密碼：${pw}，有效至 ${data.expires}`);
    document.getElementById('newLabel').value = '';
    document.getElementById('newPw').value = '';
    await loadList();
  } else {
    showMsg(msg, 'err', '❌ ' + (data.error || '新增失敗'));
  }
  btn.disabled = false;
  btn.textContent = '新增帳號';
}

async function deleteAccount(id, label) {
  if (!confirm(`確定刪除「${label}」的試用帳號？`)) return;
  await fetch(`/api/admin/trials/${id}`, {method:'DELETE'});
  await loadList();
}

async function toggleAccount(id) {
  await fetch(`/api/admin/trials/${id}/toggle`, {method:'POST'});
  await loadList();
}

function showMsg(el, type, text) {
  el.className = 'msg-inline ' + type;
  el.textContent = text;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 5000);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function doLogout() {
  await fetch('/api/auth/logout', {method:'POST'});
  window.location.href = '/login';
}

loadList();
setInterval(loadList, 30000);
</script>
</body>
</html>
